name: Deploy Oracle VM

on:
  push:
    branches:
      - main

concurrency:
  group: tarjetas-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Run Maven tests
        run: mvn test

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run static UI contract tests
        run: node src/test/resources/static-ui-contract-tests.mjs

      - name: Configurar SSH
        shell: bash
        env:
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          python3 - <<'PY'
          import os
          from pathlib import Path

          key = os.environ["ORACLE_SSH_KEY"]
          key = key.replace("\\r\\n", "\n").replace("\\n", "\n")
          key = key.replace("\r\n", "\n").replace("\r", "\n")
          if not key.endswith("\n"):
              key += "\n"

          Path.home().joinpath(".ssh", "oracle_deploy").write_text(key, encoding="utf-8", newline="\n")
          PY

          chmod 600 ~/.ssh/oracle_deploy

          ssh-keygen -y -f ~/.ssh/oracle_deploy > /dev/null || {
            echo "::error::ORACLE_SSH_KEY is not a readable private key. Store the full private key, including BEGIN/END lines and line breaks."
            exit 1
          }

          ssh-keyscan -H "${{ secrets.ORACLE_HOST }}" \
            >> ~/.ssh/known_hosts

          chmod 600 ~/.ssh/known_hosts

      - name: Ejecutar despliegue
        shell: bash
        run: |
          ssh \
            -i ~/.ssh/oracle_deploy \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            "${{ secrets.ORACLE_USER }}@${{ secrets.ORACLE_HOST }}" \
            "/opt/tarjetas-app/deploy.sh"
