spring.application.name=landing-tarjetas

# Local-only development server.
server.address=127.0.0.1
server.port=8080

# Local persistent H2 database. Hibernate updates the local schema for development.
spring.datasource.url=jdbc:h2:file:./data/landing-tarjetas;AUTO_SERVER=TRUE;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Local developer console. Keep the app bound to 127.0.0.1.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Minimal operational visibility.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Local logs are ignored by Git.
logging.file.name=logs/landing-tarjetas.log
