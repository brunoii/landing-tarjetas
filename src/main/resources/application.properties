spring.application.name=landing-tarjetas

# Local-only development server.
server.address=127.0.0.1
server.port=8080
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# Local persistent H2 database. Hibernate updates the local schema for development.
spring.datasource.url=jdbc:h2:file:./data/landing-tarjetas;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Local developer console. Keep the app bound to 127.0.0.1.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Mandatory local login. Credentials must come from environment variables.
app.security.enabled=true
app.security.user=${APP_SECURITY_USER:}
app.security.password-hash=${APP_SECURITY_PASSWORD_HASH:}

# Minimal operational visibility.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Local logs are ignored by Git.
logging.file.name=logs/landing-tarjetas.log

# Local PDF upload guardrails. Files are processed in memory; raw PDFs are not persisted.
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=5MB
app.statement-upload.max-file-size-bytes=1048576
