server.address=0.0.0.0
server.port=${SERVER_PORT:8080}

spring.h2.console.enabled=false
spring.datasource.url=${APP_DATASOURCE_URL}
spring.datasource.username=${APP_DATASOURCE_USERNAME}
spring.datasource.password=${APP_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.sql.init.mode=never

app.security.enabled=true
app.security.user=${APP_SECURITY_USER:}
app.security.password-hash=${APP_SECURITY_PASSWORD_HASH:}

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=${APP_SESSION_COOKIE_SECURE:true}

server.error.include-exception=false
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.whitelabel.enabled=false

management.endpoint.health.show-details=never

server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.directory=logs
server.tomcat.accesslog.prefix=landing-tarjetas-access
server.tomcat.accesslog.suffix=.log
server.tomcat.accesslog.pattern=%h %l %u %t "%m %U %H" %s %b %D
